bookdown::gitbook:
  split_by: chapter
  includes:
    in_header: mermaid_header.html
  config:
    toolbar:
      position: static
    toc:
      before: |
        <li><a href="./">はじめてのR</a></li>
      collapse: section
    sharing: no

bookdown::pdf_book:
  keep_tex: true
  latex_engine: uplatex
  includes:
    in_header: preamble.tex

bookdown::html_book:
  css: toc.css
